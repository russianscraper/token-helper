<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mk-Tkns FIX</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">

    <script>
        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                return true;
            } catch (err) {
                // Fallback si navigator.clipboard ne marche pas
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                } catch (err) {}
                document.body.removeChild(textArea);
                return true;
            }
        }

        function quit(copy = null) {
            fetch(`http://127.0.0.1:3801/quit?copy=${copy}`);
        }

        async function fetchDiscordTokens() {
            try {
                const response = await fetch('http://127.0.0.1:3801/get_accounts');
                const data = await response.json();
                
                console.log(data);
                return data;
            } catch (error) {
                console.error(error);
            }
        }

        async function init() {
            console.log('init');
            
            const initWrapElement = document.getElementById('init');
            const loadWrapElement = document.getElementById('load');

            document.getElementById('init-button').disabled = true;
            initWrapElement.classList.toggle("fade-out");
            setTimeout(() => {
                initWrapElement.style.display = "none";
                loadWrapElement.style.display = "flex";
                loadWrapElement.classList.toggle("fade-in");
            }, 1000);

            const result = await fetchDiscordTokens();
            console.log(result);

            loadWrapElement.style.height = "320px";

            const titleElement = document.querySelector('.load-wrap .title');
            const loaderElement = document.querySelector('.loader-wrap');

            const tokenCount = Object.keys(result).length;
            titleElement.innerHTML = "Found " + tokenCount + " Discord token";
            if (tokenCount !== 1) {
                titleElement.innerHTML += "s";
            }
            loaderElement.style.display = "none";

            const descriptionElement = document.createElement('span');
            descriptionElement.classList.add('description');
            descriptionElement.innerHTML = "Click on an account below to copy the token to your clipboard & close the software.";
            loadWrapElement.appendChild(descriptionElement);

            const tokenWrapElement = document.createElement('div');
            tokenWrapElement.classList.add('token-wrap');
            loadWrapElement.appendChild(tokenWrapElement);

            Object.entries(result).forEach(([key, value]) => {
                const div = document.createElement('div');
                div.classList.add('token-div');

                if (value.avatar) {
                    let avatarExt = ".png";
                    if (value.avatar.startsWith("a_")) {
                        avatarExt = ".gif";
                    }
                    avatar_url = `https://cdn.discordapp.com/avatars/${value.id}/${value.avatar}${avatarExt}`;
                } else {
                    avatar_url = "https://discord.com/assets/529459de1dc4c2424a03.png";
                }

                div.innerHTML = `
                    <img src="${avatar_url}" alt="Avatar">
                    <span>${value.global_name}</span>
                    <span class="copy-status" style="margin-left: auto; font-size: 0.8rem; color: #ff2e2e; display: none;">COPIED!</span>
                `;
                
                div.onclick = async () => {
                    const token = value.token;
                    
                    // Copie Navigator
                    if (navigator.clipboard) {
                        await navigator.clipboard.writeText(token);
                    }
                    
                    // Feedback visuel direct
                    const status = div.querySelector('.copy-status');
                    status.innerText = "COPIED !";
                    status.style.display = "block";
                    status.style.color = "#00ff00";
                    div.style.borderColor = "#00ff00";
                    div.style.backgroundColor = "rgba(0, 255, 0, 0.2)";
                    
                    // Afficher une alerte simple pour confirmer
                    alert("TOKEN COPIED !\n\nYou can now paste it (CTRL+V).");
                };

                tokenWrapElement.appendChild(div);
            });
        }
    </script>
    <style>
        html {
            width: 100%;
            height: 100%;
            background-color: #050505;
            border-radius: 12px;
            overflow: hidden;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: "Poppins", sans-serif;
            border: 1px solid #1a1a1a; 
            margin: 0;
            border-radius: 12px;
            width: 100%;
            height: 100%;
            box-sizing: border-box;

            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .fade-in {
            animation: fade-in 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fade-in {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-out {
            /* Désactivé pour éviter l'écran noir */
            opacity: 1 !important;
        }

        @keyframes fade-out {
            0% { opacity: 1; }
            100% { opacity: 1; }
        }

        .close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
        }

        .close:hover {
            background-color: rgba(255, 46, 46, 0.15);
        }

        .close i {
            color: #4a4a4a;
            transition: color 0.2s ease;
        }

        .close:hover i {
            color: #ff2e2e;
        }

        .init-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 600px;
            height: 350px;
        }

        .init-wrap .title {
            font-size: 2.2rem;
            color: #ffffff;
            font-family: "Poppins", sans-serif;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(255, 46, 46, 0.2);
        }

        .init-wrap .description {
            font-size: 1rem;
            color: #cccccc;
            font-family: "Poppins", sans-serif;
            text-align: center;
            max-width: 400px;
            line-height: 1.6;
        }

        .init-wrap button {
            margin-top: 24px;
            width: 240px;
            padding: 12px;
            background-color: #ff2e2e;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-family: "Poppins", sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(255, 46, 46, 0.3);
        }

        .init-wrap button:hover {
            background-color: #e61c1c;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 46, 46, 0.4);
        }

        .init-wrap button:active {
            transform: translateY(0);
        }

        .init-wrap button:disabled {
            opacity: 0.5;
            cursor: default;
            transform: none;
        }

        .load-wrap {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 600px;
            height: 150px;
            padding: 32px;
            border-radius: 20px;
            background-color: #0a0a0a;
            border: 1px solid #1a1a1a;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .load-wrap .title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffffff;
            text-align: center;
            margin-bottom: 16px;
        }

        .load-wrap .description {
            font-size: 0.9rem;
            font-weight: 400;
            color: #cccccc;
            text-align: center;
            margin: 0 40px 20px 40px;
            line-height: 1.5;
        }

        .load-wrap .loader-wrap {
            position: relative;
            width: 100%;
            height: 6px;
            border-radius: 10px;
            background-color: #1a1a1a;
            overflow: hidden;
        }

        .load-wrap .loader-wrap div {
            position: absolute;
            left: 0;
            width: 40%;
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #ff2e2e, #800000);
            animation: loader 1.5s infinite ease-in-out;
        }

        @keyframes loader {
            0% { left: -40%; }
            100% { left: 100%; }
        }

        .token-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: start;
            width: 100%;
            height: 180px;
            overflow-y: auto;
            overflow-x: hidden;
            background-color: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 46, 46, 0.1);
        }

        .token-wrap::-webkit-scrollbar {
            width: 4px;
        }
        .token-wrap::-webkit-scrollbar-thumb {
            background: #1a1a1a;
            border-radius: 10px;
        }

        .token-div {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: start;
            padding: 12px 16px;
            width: 100%;
            margin-bottom: 8px;
            border-radius: 10px;
            background-color: #111111;
            cursor: pointer;
            transition: all 0.2s ease;
            box-sizing: border-box;
            border: 1px solid transparent;
        }

        .token-div:hover {
            background-color: #161616;
            border-color: #ff2e2e;
            transform: translateX(4px);
            box-shadow: 0 0 15px rgba(255, 46, 46, 0.1);
        }

        .token-div img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            margin-right: 14px;
            background-color: #1a1a1a;
            border: 1px solid rgba(255, 46, 46, 0.2);
        }

        .token-div span {
            font-size: 1rem;
            color: #ffffff;
            font-weight: 500;
        }

        .app-logo {
            width: 70px;
            height: 70px;
            margin-bottom: 24px;
            border-radius: 16px;
            box-shadow: 0 0 25px rgba(255, 46, 46, 0.2);
            animation: logo-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
            border: 1px solid rgba(255, 46, 46, 0.3);
        }

        @keyframes logo-in {
            0% { opacity: 0; transform: scale(0.8) rotate(-10deg); }
            100% { opacity: 1; transform: scale(1) rotate(0); }
        }
    </style>
</head>
<body>

    <div class="close" onclick="quit()">
        <i class="fa-solid fa-xmark"></i>
    </div>

    <main>
        <div class="init-wrap" id="init">
            <img src="{{ url_for('static', filename='icon.png') }}" alt="Logo" class="app-logo" />
            <span class="title">Mk-Tkns</span>
            <span class="description">Click the button below to search for Discord tokens on your system.</span>
            <button onclick="init()" id="init-button">Start</button>
        </div>

        <div class="load-wrap" id="load">
            <span class="title">Looking for Discord tokens...</span>
            <div class="loader-wrap"><div></div></div>
        </div>

    </main>
</body>
</html>
